<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitTrack - Health & Fitness Tracker</title>

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#222;
    --primary:#22c55e;
    --secondary:#2563eb;
    --danger:#ef4444;
    --shadow:0 4px 12px rgba(0,0,0,0.08);
}

.dark{
    --bg:#111827;
    --card:#1f2937;
    --text:#f3f4f6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

.container{
    max-width:1300px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h1{
    color:var(--primary);
}

button{
    border:none;
    cursor:pointer;
    border-radius:10px;
}

.theme-btn{
    padding:10px 15px;
    background:var(--secondary);
    color:white;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    box-shadow:var(--shadow);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

.save-btn{
    background:var(--primary);
    color:white;
    padding:12px;
    width:100%;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.stat{
    text-align:center;
    padding:15px;
    border-radius:12px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
}

.table{
    width:100%;
    border-collapse:collapse;
}

.table th,.table td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.progress{
    height:14px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    background:#22c55e;
}

.friend-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    background:rgba(34,197,94,.12);
}

@media(max-width:768px){
    header{
        flex-direction:column;
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🏃 FitTrack Daily Health Tracker</h1>
<button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</header>

<div class="card">

<h2>User Selection</h2>

<select id="userSelect" onchange="loadUser()">
<option>User 1</option>
<option>User 2</option>
<option>User 3</option>
</select>

<input id="name" placeholder="Name">
<input id="age" type="number" placeholder="Age">
<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">

<button class="save-btn" onclick="saveUser()">
Save Profile
</button>

</div>

<div class="stats">

<div class="stat">
<h3 id="bmi">0</h3>
<p>BMI</p>
</div>

<div class="stat">
<h3 id="stepsStat">0</h3>
<p>Steps</p>
</div>

<div class="stat">
<h3 id="waterStat">0</h3>
<p>Water (L)</p>
</div>

<div class="stat">
<h3 id="calorieStat">0</h3>
<p>Calories</p>
</div>

</div>

<br>

<div class="grid">

<div class="card">

<h2>🍳 Breakfast</h2>
<input id="breakfastTime" type="time">
<textarea id="breakfastMeal" placeholder="Breakfast details"></textarea>
<input id="breakfastCalories" type="number" placeholder="Calories">

</div>

<div class="card">

<h2>🍛 Lunch</h2>
<input id="lunchTime" type="time">
<textarea id="lunchMeal" placeholder="Lunch details"></textarea>
<input id="lunchCalories" type="number" placeholder="Calories">

</div>

<div class="card">

<h2>🍲 Dinner</h2>
<input id="dinnerTime" type="time">
<textarea id="dinnerMeal" placeholder="Dinner details"></textarea>
<input id="dinnerCalories" type="number" placeholder="Calories">

</div>

</div>

<div class="grid">

<div class="card">

<h2>💧 Water Intake</h2>
<input id="water" type="number" placeholder="Litres">

<h2>🚶 Daily Steps</h2>
<input id="steps" type="number" placeholder="Steps">

<h2>🔥 Calories Burned</h2>
<input id="burned" type="number" placeholder="Calories Burned">

</div>

<div class="card">

<h2>🏋 Exercise Log</h2>

<textarea id="exercise"
placeholder="Running 5km, Gym 45 mins, Cricket, Cycling etc"></textarea>

<label>Goal Progress</label>

<div class="progress">
<div id="stepProgress" class="progress-bar" style="width:0%"></div>
</div>

<br>

<small>Goal: 10,000 steps/day</small>

</div>

</div>

<div class="card">

<button class="save-btn" onclick="saveDaily()">
Save Daily Log
</button>

</div>

<div class="card">

<h2>🏆 Friends Leaderboard (Steps)</h2>

<div id="leaderboard"></div>

</div>

</div>

<script>

let currentUser='User 1';

function getUsers(){
    return JSON.parse(localStorage.getItem('fittrackUsers')||'{}');
}

function saveUsers(data){
    localStorage.setItem('fittrackUsers',JSON.stringify(data));
}

function saveUser(){

    const users=getUsers();

    users[currentUser]=users[currentUser]||{};

    users[currentUser].name=document.getElementById('name').value;
    users[currentUser].age=document.getElementById('age').value;
    users[currentUser].height=document.getElementById('height').value;
    users[currentUser].weight=document.getElementById('weight').value;

    saveUsers(users);

    calculateBMI();

    alert('Profile Saved');
}

function saveDaily(){

    const users=getUsers();

    users[currentUser]=users[currentUser]||{};

    users[currentUser].breakfastTime=
    breakfastTime.value;

    users[currentUser].breakfastMeal=
    breakfastMeal.value;

    users[currentUser].breakfastCalories=
    breakfastCalories.value;

    users[currentUser].lunchTime=
    lunchTime.value;

    users[currentUser].lunchMeal=
    lunchMeal.value;

    users[currentUser].lunchCalories=
    lunchCalories.value;

    users[currentUser].dinnerTime=
    dinnerTime.value;

    users[currentUser].dinnerMeal=
    dinnerMeal.value;

    users[currentUser].dinnerCalories=
    dinnerCalories.value;

    users[currentUser].water=
    water.value;

    users[currentUser].steps=
    steps.value;

    users[currentUser].exercise=
    exercise.value;

    users[currentUser].burned=
    burned.value;

    saveUsers(users);

    updateDashboard();
    leaderboard();

    alert('Daily Data Saved');
}

function loadUser(){

    currentUser=
    document.getElementById('userSelect').value;

    const users=getUsers();

    const u=users[currentUser]||{};

    name.value=u.name||'';
    age.value=u.age||'';
    height.value=u.height||'';
    weight.value=u.weight||'';

    breakfastTime.value=u.breakfastTime||'';
    breakfastMeal.value=u.breakfastMeal||'';
    breakfastCalories.value=u.breakfastCalories||'';

    lunchTime.value=u.lunchTime||'';
    lunchMeal.value=u.lunchMeal||'';
    lunchCalories.value=u.lunchCalories||'';

    dinnerTime.value=u.dinnerTime||'';
    dinnerMeal.value=u.dinnerMeal||'';
    dinnerCalories.value=u.dinnerCalories||'';

    water.value=u.water||'';
    steps.value=u.steps||'';
    exercise.value=u.exercise||'';
    burned.value=u.burned||'';

    updateDashboard();
}

function calculateBMI(){

    let h=parseFloat(height.value)/100;
    let w=parseFloat(weight.value);

    if(h && w){

        let bmi=(w/(h*h)).toFixed(1);

        document.getElementById('bmi').innerText=bmi;
    }
}

function updateDashboard(){

    calculateBMI();

    const totalCalories=
    Number(breakfastCalories.value||0)+
    Number(lunchCalories.value||0)+
    Number(dinnerCalories.value||0);

    calorieStat.innerText=totalCalories;

    stepsStat.innerText=steps.value||0;
    waterStat.innerText=water.value||0;

    let progress=Math.min(
        ((steps.value||0)/10000)*100,
        100
    );

    stepProgress.style.width=
    progress+"%";
}

function leaderboard(){

    const users=getUsers();

    let arr=[];

    Object.keys(users).forEach(k=>{

        arr.push({
            name:users[k].name||k,
            steps:Number(users[k].steps||0)
        });

    });

    arr.sort((a,b)=>b.steps-a.steps);

    let html='';

    arr.forEach((u,i)=>{

        html+=`
        <div class="friend-item">
        <strong>#${i+1} ${u.name}</strong>
        <span>${u.steps} steps</span>
        </div>`;
    });

    document.getElementById('leaderboard')
    .innerHTML=html;
}

function toggleTheme(){
    document.body.classList.toggle('dark');
}

loadUser();
leaderboard();

</script>

</body>
</html>
